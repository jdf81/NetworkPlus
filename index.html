      <button class="palette-toggle" id="palBtn">${showPalette?"Hide":"Show"} all questions</button>
      ${cur===EXAM_SIZE-1
        ? `<button class="btn sm" id="finishBtn">Finish &amp; Score</button>`
        : `<button class="btn sm" id="nextBtn">Next &rarr;</button>`}
    </div>
    ${answeredCount===EXAM_SIZE && cur!==EXAM_SIZE-1
      ? `<div style="margin-top:14px;text-align:center"><button class="btn" id="finishBtn2">All ${EXAM_SIZE} answered — Finish &amp; Score</button></div>`
      : ""}
  </div>`;

  // option clicks
  $app.querySelectorAll(".opt").forEach(btn => {
    btn.onclick = () => {
      item.picked = parseInt(btn.dataset.i,10);
      // advance automatically if not last; small delay for feedback
      $app.querySelectorAll(".opt").forEach(b=>b.classList.remove("sel"));
      btn.classList.add("sel");
      const bar = $app.querySelector(".progress > i");
      const ac = exam.filter(e=>e.picked!==null).length;
      if(bar) bar.style.width = Math.round((ac/EXAM_SIZE)*100)+"%";
      if(cur < EXAM_SIZE-1){
        setTimeout(()=>{ cur++; render(); }, 180);
      } else {
        render();
      }
    };
  });
  const prev=document.getElementById("prevBtn"); if(prev) prev.onclick=()=>{ if(cur>0){cur--;render();} };
  const next=document.getElementById("nextBtn"); if(next) next.onclick=()=>{ if(cur<EXAM_SIZE-1){cur++;render();window.scrollTo(0,0);} };
  const pal=document.getElementById("palBtn"); if(pal) pal.onclick=()=>{ showPalette=!showPalette; render(); };
  const fin=document.getElementById("finishBtn"); if(fin) fin.onclick=confirmFinish;
  const fin2=document.getElementById("finishBtn2"); if(fin2) fin2.onclick=confirmFinish;
  $app.querySelectorAll("[data-jump]").forEach(c=>{
    c.onclick=()=>{ cur=parseInt(c.dataset.jump,10); showPalette=false; render(); window.scrollTo(0,0); };
  });
}

function confirmFinish(){
  const answered = exam.filter(e=>e.picked!==null).length;
  const unanswered = EXAM_SIZE - answered;
  const modal = document.createElement("div");
  modal.className="modal-bg";
  modal.innerHTML = `<div class="modal">
    <h3>Submit exam?</h3>
    <p>${unanswered>0
      ? `You have <b style="color:var(--warn)">${unanswered} unanswered</b> question${unanswered>1?"s":""}. Unanswered questions are marked incorrect.`
      : `All ${EXAM_SIZE} questions answered. Ready to see your score?`}</p>
    <div class="btn-row">
      <button class="btn ghost" id="cancelFin">Keep working</button>
      <button class="btn" id="doFin">Submit</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  document.getElementById("cancelFin").onclick=()=>modal.remove();
  document.getElementById("doFin").onclick=()=>{ modal.remove(); finishExam(); };
  modal.onclick=(e)=>{ if(e.target===modal) modal.remove(); };
}

function finishExam(){
  stopTimer();
  endTime = Date.now();
  mode="results";
  reviewFilter="all";
  render();
  window.scrollTo(0,0);
}

function renderResults(){
  const r = scoreExam();
  const elapsed = Math.floor((endTime-startTime)/1000);
  const C = 2*Math.PI*78; // ring circumference, radius 78
  const dash = (r.pct/100)*C;
  const ringColor = r.pass ? "var(--good)" : "var(--bad)";

  let domHtml = "";
  ORDER.forEach(d => {
    const D = DOMAINS[d];
    const s = r.per[d];
    const dp = s.total ? Math.round((s.correct/s.total)*100) : 0;
    domHtml += `<div class="dr">
      <div class="dr-head">
        <span class="nm"><span class="dot" style="background:${D.color}"></span>${d} ${esc(D.name)}</span>
        <span class="fr">${s.correct}/${s.total} &middot; ${dp}%</span>
      </div>
      <div class="dr-track"><i style="width:${dp}%;background:${D.color}"></i></div>
    </div>`;
  });

  $app.innerHTML = `
  <div class="card">
    <div class="score-hero">
      <div class="ring-wrap">
        <svg width="180" height="180" viewBox="0 0 180 180">
          <circle cx="90" cy="90" r="78" fill="none" stroke="var(--line)" stroke-width="13"/>
          <circle cx="90" cy="90" r="78" fill="none" stroke="${ringColor}" stroke-width="13"
            stroke-linecap="round" stroke-dasharray="${dash} ${C}"
            style="transition:stroke-dasharray 1s cubic-bezier(.2,.8,.2,1)"/>
        </svg>
        <div class="ring-center">
          <div class="pctnum" style="color:${ringColor}">${r.pct}%</div>
          <div class="pctlbl">${r.correct} / ${EXAM_SIZE}</div>
        </div>
      </div>
      <div class="verdict ${r.pass?"pass":"fail"}">${r.pass?"✓ PASS":"✗ Did Not Pass"}</div>
      <p class="score-sub">Target to pass: ${PASS_PCT}% &middot; You scored ${r.pct}%</p>
    </div>

    <div class="stat-row">
      <div class="stat"><div class="v" style="color:var(--good)">${r.correct}</div><div class="l">Correct</div></div>
      <div class="stat"><div class="v" style="color:var(--bad)">${EXAM_SIZE - r.correct}</div><div class="l">Incorrect</div></div>
      <div class="stat"><div class="v">${fmtTime(elapsed)}</div><div class="l">Time Used</div></div>
    </div>

    <h3 style="margin:26px 0 4px;font-size:1.05rem">Performance by Domain</h3>
    <div class="dom-results">${domHtml}</div>

    <div class="btn-row">
      <button class="btn ghost" id="reviewBtn">Review Answers</button>
      <button class="btn" id="retakeBtn">New Exam</button>
    </div>
    <p class="footnote">CompTIA reports a scaled score from 100–900 with 720 to pass; exact raw-to-scaled conversion is proprietary. This tool uses ${PASS_PCT}% as a practical benchmark. Questions are re-randomized every attempt.</p>
  </div>
  <div id="reviewArea"></div>`;

  document.getElementById("retakeBtn").onclick=()=>{ mode="start"; render(); window.scrollTo(0,0); };
  document.getElementById("reviewBtn").onclick=()=>{ renderReview(); document.getElementById("reviewArea").scrollIntoView({behavior:"smooth"}); };
}

function renderReview(){
  const area = document.getElementById("reviewArea");
  const wrong = exam.filter(e=>e.picked!==e.correctIdx).length;
  let list = exam.map((e,i)=>({e,i}));
  if(reviewFilter==="wrong") list = list.filter(x=>x.e.picked!==x.e.correctIdx);
  if(reviewFilter==="correct") list = list.filter(x=>x.e.picked===x.e.correctIdx);
  ORDER.forEach(d=>{ if(reviewFilter==="dom_"+d) list = exam.map((e,i)=>({e,i})).filter(x=>x.e.q.d===d); });

  let tabs = `
    <button class="ftab ${reviewFilter==="all"?"on":""}" data-f="all">All ${EXAM_SIZE}</button>
    <button class="ftab ${reviewFilter==="wrong"?"on":""}" data-f="wrong">Incorrect ${wrong}</button>
    <button class="ftab ${reviewFilter==="correct"?"on":""}" data-f="correct">Correct ${EXAM_SIZE-wrong}</button>`;
  ORDER.forEach(d=>{
    tabs += `<button class="ftab ${reviewFilter==="dom_"+d?"on":""}" data-f="dom_${d}">${d}</button>`;
  });

  let body = "";
  if(list.length===0){
    body = `<p style="color:var(--muted);text-align:center;padding:20px">Nothing to show in this filter.</p>`;
  }
  list.forEach(({e,i})=>{
    const D = DOMAINS[e.q.d];
    const ok = e.picked===e.correctIdx;
    let opts="";
    e.opts.forEach((o,oi)=>{
      let cls="";
      if(oi===e.correctIdx) cls="c";
      else if(oi===e.picked && !ok) cls="w";
      opts += `<div class="rev-opt ${cls}">
        <span class="rk">${LETTERS[oi]}</span>
        <span>${esc(o)}${oi===e.correctIdx?" &nbsp;✓":""}${(oi===e.picked&&!ok)?" &nbsp;✗ your answer":""}</span>
      </div>`;
    });
    body += `<div class="rev-q">
      <div class="rq-top">
        <span class="dchip" style="margin:0;color:${D.color};border-color:${D.color}66;background:${D.color}14">${e.q.d}</span>
        <span class="idx">Question ${i+1}</span>
        <span class="mk ${ok?"ok":"no"}">${ok?"CORRECT":(e.picked===null?"SKIPPED":"INCORRECT")}</span>
      </div>
      <div class="rqtext">${esc(e.q.q)}</div>
      ${opts}
      <div class="rev-exp"><b>Why:</b> ${esc(e.q.e)}</div>
    </div>`;
  });

  area.innerHTML = `<div class="card">
    <h3 style="margin:0 0 2px;font-size:1.05rem">Answer Review</h3>
    <div class="filter-tabs">${tabs}</div>
    ${body}
  </div>`;

  area.querySelectorAll(".ftab").forEach(t=>{
    t.onclick=()=>{ reviewFilter=t.dataset.f; renderReview(); };
  });
}

/* ============ BOOT ============ */
function boot(){
  if(typeof QUESTION_POOL!=="undefined" && Array.isArray(QUESTION_POOL)){
    pool = QUESTION_POOL;
  }
  render();
}
boot();
</script>
</body>
</html>
